<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Event</title>
</head>
<body style="background-color: #414141; color: aliceblue;">
    <h2>Amazing images</h2>

        <ul id="images">

            <li><img width="200px" id="owl" src="https://images.pexels.com/photos/28862906/pexels-photo-28862906.jpeg" alt=""></li>
            <li><img width="200px" id="prayer" src="https://images.pexels.com/photos/5935662/pexels-photo-5935662.jpeg" alt=""></li>
            <li><a style="color: aliceblue;" href="https://www.google.com" id="google">Google</a></li>
        </ul>
    </div>
</body>
<script>
    // document.getElementById('owl').onclick = function(){

</html>
